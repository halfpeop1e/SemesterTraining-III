server:
  port: 8080

spring:
  application:
    name: rail-transit-sim

rail:
  signal:
    # true: educational simulator uses teacher static topology with simulated clear aspects.
    # false: laboratory/HIL mode; missing live signal aspects remain fail-safe.
    simulated-interlocking: true

signal:
  udp:
    send-port: 5001
    listen-port: 5002
    send-interval-ms: 100
    receive-timeout-ms: 300
    remote-host: 127.0.0.1
    enabled: false

vehicle:
  protocol704:
    host: 192.168.100.123
    ports: 8001,8002,8003
    connect-timeout-ms: 3000
    read-timeout-ms: 1000
    auto-start: false
