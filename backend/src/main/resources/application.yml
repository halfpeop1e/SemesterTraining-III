server:
  port: 8080

spring:
  application:
    name: rail-transit-sim

rail:
  signal:
    # true: educational simulator uses teacher static topology with simulated clear aspects.
    # false: laboratory/HIL mode; missing live signal aspects remain fail-safe.
    simulated-interlocking: true
    # Single-train laboratory workflow: automatically establish the next
    # verified station leg after initialization and each completed door cycle.
    auto-laboratory-station-leg: true

signal:
  udp:
    send-port: 5001
    listen-port: 5002
    send-interval-ms: 100
    receive-timeout-ms: 300
    remote-host: 127.0.0.1
    enabled: false

vehicle:
  protocol704:
    host: 192.168.100.123
    ports: 8001,8002,8003
    # The teacher PLC mirrors the same 46B desk frame on all three sockets.
    # Read every port for diagnosis, but only this socket is allowed to drive
    # the simulated train so mirrored frames cannot overwrite one lifecycle.
    control-port: 8001
    connect-timeout-ms: 3000
    read-timeout-ms: 1000
    auto-start: false
    # After real PLC control has started, stale input must not leave traction latched.
    fail-safe-on-stale: true
    stale-input-ms: 1500
    # Retained only for backwards-compatible configuration files. Protocol704Service
    # is always input-only; LabHilGateway is the sole PLC physical-output owner.
    plc-output-enabled: false
    hmi-output-enabled: false
    mmi-output-enabled: false

# Hardware-in-the-loop output gateway. Keep disabled outside the laboratory.
hil:
  enabled: false
  train-id: LB
  connect-timeout-ms: 1000
  screen-period-ms: 200
  signal-screen:
    enabled: false
    # Laboratory capture: port defines the role; supplied document swaps .121/.122.
    host: 192.168.100.122
    port: 9999
  network-screen:
    enabled: false
    host: 192.168.100.121
    port: 8888
  plc-output:
    enabled: false
    period-ms: 500
    # Laboratory deployment uses the captured 28B/dataLen=4 variant: lamp
    # bytes at 24/25 followed by the speed WORD at 26/27.
    frame-format: capture-variant-28
  vision:
    # Vision 1.3 TCMS2VIEW, documented 128-byte main-line base packet.
    # The captured 154-byte packet is a separate 92-signal/40-switch variant.
    enabled: false
    host: 192.168.100.124
    port: 8303
    period-ms: 100
    # Only this profile has a complete local signal/switch order table.
    # Do not set capture-154 until the 92/40 ordering is supplied and encoded.
    profile: documented-128
